        if (activeTabGlobal === 2) renderClassement();
    }
}

function genererCalendrier(clubList) {
    const calendar = {}; const n = clubList.length; const teams = clubList.map((c, idx) => ({ ...c, id: idx }));
    for (let round = 0; round < n - 1; round++) {
        const jNum = round + 1; calendar[jNum] = [];
        for (let i = 0; i < n / 2; i++) {
            const home = teams[i]; const away = teams[n - 1 - i];
            const isReverse = (round % 2 === 1 && i === 0) || (i > 0 && (i + round) % 2 === 1);
            calendar[jNum].push({
                home: (isReverse ? away : home).home, codeH: (isReverse ? away : home).code, bgH: (isReverse ? away : home).bg, textH: (isReverse ? away : home).text,
                away: (isReverse ? home : away).home, codeA: (isReverse ? home : away).code, bgA: (isReverse ? home : away).bg, textA: (isReverse ? home : away).text,
                stats: { h: 40, n: 25, a: 35 }
            });
        }
        teams.splice(1, 0, teams.pop());
    }
    for (let j = 1; j <= n / 2; j++) {
        calendar[j + (n - 1)] = calendar[j].map(m => ({ home: m.away, codeH: m.codeA, bgH: m.bgA, textH: m.textH, away: m.home, codeA: m.codeH, bgA: m.bgH, textA: m.textH, stats: { h: 35, n: 25, a: 40 } }));
    }
    return calendar;
}

            <div class="bg-slate-900/90 p-5 rounded-2xl border border-slate-800 text-center space-y-2.5">
                <p class="text-xs text-slate-400 font-bold uppercase">Ton Code Ami Unique :</p>
                <div class="text-2xl font-black text-amber-400 tracking-wider bg-slate-950 py-2.5 px-5 rounded-xl inline-block border border-amber-400/30">${monCodeAmi}</div>
                <p class="text-[11px] text-slate-400">Partage ce code ou le lien de l'application à tes amis pour qu'ils t'ajoutent.</p>
            </div>

            <div class="bg-slate-900/90 p-5 rounded-2xl border border-slate-800 space-y-3.5">
                <h4 class="font-bold text-amber-400 text-sm">➕ Ajouter un ami par son pseudo :</h4>
                <div class="flex gap-2.5">
                    <input type="text" id="input-nom-ami" placeholder="Entre le pseudo de ton ami..." class="flex-1 bg-slate-950 border-2 border-slate-700 focus:border-amber-400 rounded-xl px-4 py-3 text-amber-400 font-bold outline-none text-sm">
                    <button onclick="ajouterAmi()" class="bg-gradient-to-r from-amber-400 to-yellow-500 text-black px-5 py-3 rounded-xl font-black text-xs active:scale-95 transition-all">Ajouter</button>
                </div>
            </div>

            <div class="space-y-3.5">
                <div class="flex justify-between items-center mb-1">
                    <h4 class="font-bold text-amber-400 text-sm">🏆 Classement Amis :</h4>
                    <span class="text-xs bg-slate-900 px-3.5 py-1.5 rounded-full border border-slate-700 font-bold text-amber-400">${leagueNames[currentLeague]}</span>
                </div>`;

    let mesAmisAffiches = [userProfile.name, ...listeAmis];
    let classementAmisFiltre = mesAmisAffiches.map((nomAmi) => ({ name: nomAmi, score: 0 }));
    classementAmisFiltre.sort((a, b) => b.score - a.score);

    classementAmisFiltre.forEach((f, idx) => {
        let isMe = f.name === userProfile.name;
        let scoreAmiSecurise = (f.score !== undefined && f.score !== null) ? f.score : 0;
        html += `
            <div class="bg-slate-900 border ${isMe ? 'border-amber-400 bg-amber-400/10' : 'border-slate-800'} p-4 rounded-2xl flex items-center justify-between shadow">
                <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-xl bg-slate-950 flex items-center justify-center font-black text-amber-400 text-xs">#${idx + 1}</span>
                    <span class="font-bold text-white text-sm">${f.name} ${isMe ? '(Toi)' : ''}</span>
                </div>
                <div class="flex items-center gap-3.5">
                    <span class="font-black text-amber-400 text-base">${scoreAmiSecurise} pts</span>
                    ${!isMe ? `<button onclick="supprimerAmi('${f.name}')" class="text-xs text-red-400 hover:text-red-300 font-bold px-2.5 py-1 bg-red-500/10 rounded-lg">✕</button>` : ''}
                </div>
            </div>`;
    });

    html += `</div></div>`;
    document.getElementById('content').innerHTML = html;
}

async function ajouterAmi() {
    let input = document.getElementById('input-nom-ami');
    let nomAmi = input.value.trim();
    if (!nomAmi) { alert("Entre un pseudo valide !"); return; }
    
    // Vérification anti-doublon local
    if (nomAmi.toLowerCase() === userProfile.name.toLowerCase() || listeAmis.map(a => a.toLowerCase()).includes(nomAmi.toLowerCase())) {
        alert("Cet ami est déjà dans ta liste !");
        return;
    }

    // Vérification réelle dans la base de données Supabase (table pronos)
    // On regarde si un utilisateur a déjà enregistré au moins un prono ou un profil avec ce pseudo/email
    let { data, error } = await supabaseClient
        .from('pronos')
        .select('user_email');

    let pseudoExiste = false;
    if (data) {
        // On vérifie si le pseudo correspond soit au début de l'email, soit à un pseudo enregistré
        pseudoExiste = data.some(row => row.user_email && row.user_email.split('@')[0].toLowerCase() === nomAmi.toLowerCase());
    }

    // Pour que tu puisses tester facilement entre amis réels connectés : 
    // Si l'ami n'a pas encore validé de prono sur Supabase, on vérifie aussi s'il est inscrit dans la base Auth ou si on l'autorise en mode test strict.
    // Mettons une vérification stricte : si le pseudo n'est pas dans la base Supabase (et n'est pas un avatar/bot de test autorisé), on refuse.
    let avatarsConnus = ["kyky", "cyborg", "the goat", "cr7", "grizou", "zizou"];
    
    // Si tu veux tester avec tes amis, il faut qu'ils se soient connectés au moins une fois sur l'app.
    // Si le pseudo n'est pas trouvé :
    if (!pseudoExiste && !avatarsConnus.includes(nomAmi.toLowerCase()) && nomAmi.toLowerCase() !== "roiprono") {
        alert("Le pseudo n'existe pas ou l'utilisateur n'est pas inscrit sur PronoKings !");
        return;
    }

    listeAmis.push(nomAmi);
    localStorage.setItem('pronokings_amis', JSON.stringify(listeAmis));
    input.value = '';
    renderAmis();
}

function supprimerAmi(nom) {
    listeAmis = listeAmis.filter(a => a !== nom);
    localStorage.setItem('pronokings_amis', JSON.stringify(listeAmis));
    renderAmis();
}

function switchTab(n) {
    activeTabGlobal = n;
    document.querySelectorAll('button[id^="tab"]').forEach((b, idx) => {
        if (idx === n) { b.classList.add('tab-active'); b.classList.remove('tab-gold-frame'); }
        else { b.classList.remove('tab-active'); b.classList.add('tab-gold-frame'); }
    });
    if (n === 0) renderPronos(); 
    else if (n === 1) renderRegles(); 
    else if (n === 2) renderClassement(); 
    else if (n === 3) renderHallOfFame(); 
    else if (n === 4) renderRecompenses(); 
    else if (n === 5) renderLive(); 
    else if (n === 6) renderAmis();
}

mettreAJourHeaderProfil();
detecterJourneeActiveAutomatique();

verifierSessionSupabase();
switchTab(2);
</script>
