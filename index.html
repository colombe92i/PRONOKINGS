    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
        currentUser = session.user;
        document.getElementById('auth-modal').classList.add('hidden');
        if (currentUser.email) {
            let pseudoExtrait = currentUser.email.split('@')[0];
            if (userProfile.name === "RoiProno") userProfile.name = pseudoExtrait;
        }
        mettreAJourHeaderProfil();
        chargerPronosDepuisSupabase();
    } else {
        document.getElementById('auth-modal').classList.remove('hidden');
    }
}

function basculerModeAuth() {
    isSignUpMode = !isSignUpMode;
    document.getElementById('auth-title').innerText = isSignUpMode ? "Créer un compte" : "Connexion à ton compte";
    document.getElementById('auth-submit-btn').innerText = isSignUpMode ? "S'inscrire" : "Se connecter";
    document.getElementById('auth-switch-btn').innerText = isSignUpMode ? "Déjà un compte ? Se connecter" : "Pas encore de compte ? S'inscrire";
}

async function gererAuthSupabase() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value.trim();
    if (!email || !password) { alert("Remplis ton e-mail et ton mot de passe !"); return; }

    if (isSignUpMode) {
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) { alert("Erreur d'inscription : " + error.message); }
        else {
            alert("Compte créé avec succès ! Tu es connecté.");
            currentUser = data.user;
            document.getElementById('auth-modal').classList.add('hidden');
            mettreAJourHeaderProfil();
            chargerPronosDepuisSupabase();
        }
    } else {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) { alert("Erreur de connexion : " + error.message); }
        else {
            currentUser = data.user;
            document.getElementById('auth-modal').classList.add('hidden');
            let pseudoExtrait = currentUser.email.split('@')[0];
            if (userProfile.name === "RoiProno") userProfile.name = pseudoExtrait;
            mettreAJourHeaderProfil();
            chargerPronosDepuisSupabase();
        }
    }
}

async function deconnexionSupabase() {
    await supabaseClient.auth.signOut();
    currentUser = null;
    fermerProfilModal();
    document.getElementById('auth-modal').classList.remove('hidden');
}

function genererPronoFlashDirect() {
    if (verifierVerrouillageGrille()) {
        alert("Les grilles sont fermées ! Impossible de générer des pronostics.");
        return;
    }
    const currentMatches = premieresJournees[currentLeague] || [];
    if (!currentUser) return;
    if (!allPronos[currentLeague]) allPronos[currentLeague] = {};
    if (!allPronos[currentLeague][1]) allPronos[currentLeague][1] = {};
    if (!allPronos[currentLeague][1][currentUser.email]) allPronos[currentLeague][1][currentUser.email] = {};

    const scoresPlausibles = [[1,0], [2,1], [1,1], [2,0], [0,1], [0,0], [3,1], [1,2]];
    currentMatches.forEach((_, i) => {
        if (!allPronos[currentLeague][1][currentUser.email][i] || !allPronos[currentLeague][1][currentUser.email][i].validated) {
            const randomScore = scoresPlausibles[Math.floor(Math.random() * scoresPlausibles.length)];
            allPronos[currentLeague][1][currentUser.email][i] = { h: randomScore[0], a: randomScore[1], validated: false };
        }
    });
    renderPronos();
}

async function reinitialiserPronos() {
    if (verifierVerrouillageGrille()) {
        alert("Les grilles sont fermées, impossible de réinitialiser !");
        return;
    }
    if (!confirm("Veux-tu vraiment effacer tes pronostics pour cette journée ?")) return;
    if (!currentUser) return;

    if (allPronos[currentLeague] && allPronos[currentLeague][1] && allPronos[currentLeague][1][currentUser.email]) {
        delete allPronos[currentLeague][1][currentUser.email];
    }
    await supabaseClient.from('pronos').delete().match({ user_email: currentUser.email, league: currentLeague, journee: 1 });
    renderPronos();
    alert("Tes pronostics ont été réinitialisés avec succès !");
}

        confetti({ particleCount: 60, angle: 120, spread: 55, origin: { x: 1, y: 0.8 }, colors: ['#fbbf24', '#f59e0b', '#38bdf8', '#ffffff'] });
    }
}

function updateProgressBar() {
    if (!currentUser) return;
    const currentMatches = premieresJournees[currentLeague] || [];
    const pronosJ = allPronos[currentLeague]?.[1]?.[currentUser.email] || {};
    let count = 0; currentMatches.forEach((_, i) => { if (pronosJ[i] && pronosJ[i].validated) count++; });
    const percent = currentMatches.length > 0 ? (count / currentMatches.length) * 100 : 0;
    document.getElementById('progress-bar').style.width = percent + '%';
    document.getElementById('progress-text').innerText = `${count}/${currentMatches.length} validés`;
}

window.validerUnicProno = async function(i) {
    if (verifierVerrouillageGrille()) {
        alert("Impossible de valider : les grilles sont fermées !");
        return;
    }
    const hInput = document.getElementById('h' + i); const aInput = document.getElementById('a' + i);
    if (!hInput || !aInput || hInput.value === '' || aInput.value === '') { alert("Remplis les deux scores !"); return; }
    const h = parseInt(hInput.value, 10); const a = parseInt(aInput.value, 10);
    if (!currentUser) return;
    
    if (!allPronos[currentLeague]) allPronos[currentLeague] = {};

    if (!allPronos[currentLeague][1][currentUser.email]) allPronos[currentLeague][1][currentUser.email] = {};

function calculerScoreJoueur(nomJoueur, ligueFiltre, typeClassement) {
    let totalPoints = 0;
    let liguesCiblees = (ligueFiltre === 'GLOBAL') ? ['L1', 'PL', 'LI', 'BL', 'SA'] : [ligueFiltre];

    liguesCiblees.forEach(ligue => {
        let pronosLigue = allPronos[ligue]?.[1] || {};
        for (let email in pronosLigue) {
            let pseudoUser = (email === currentUser?.email) ? userProfile.name : email.split('@')[0];
            if (pseudoUser.toLowerCase() === nomJoueur.toLowerCase()) {
                let pronosMatchs = pronosLigue[email];
                let matchesLigue = premieresJournees[ligue] || [];
                
                matchesLigue.forEach((_, idx) => {
                    let prono = pronosMatchs[idx];
                    let scoreReel = scoresReelsAPI[ligue]?.[idx];

                    if (prono && prono.validated && scoreReel && scoreReel.finished) {
                        if (prono.h === scoreReel.h && prono.a === scoreReel.a) {
                            totalPoints += 3;
                        } else {
                            let pronoSigne = Math.sign(prono.h - prono.a);
                            let reelSigne = Math.sign(scoreReel.h - scoreReel.a);
                            if (pronoSigne === reelSigne) {
                                totalPoints += 1;
                            }
                        }
                    }
                });
            }
        }
    });

    return totalPoints;
}

function getBadgesJoueurPersistants(nomJoueur) {
    let badges = [];
    let joueursReels = [userProfile.name, ...listeAmis];
    
    let classementGlobal = [...joueursReels].map(n => ({ name: n, score: calculerScoreJoueur(n, 'GLOBAL', 'general') })).sort((a,b) => b.score - a.score);
    if (classementGlobal.length > 0 && classementGlobal[0].name === nomJoueur && classementGlobal[0].score > 0) {
        badges.push(`<span class="text-xs bg-amber-500/20 text-amber-300 px-2.5 py-1 rounded-lg font-bold border border-amber-500/30">⚡ 🌍 Leader</span>`);
    }

    let liguesDispo = ['L1', 'PL', 'LI', 'BL', 'SA'];
    let drapeauMap = { 'L1': '🇫🇷', 'PL': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'LI': '🇪🇸', 'BL': '🇩🇪', 'SA': '🇮🇹' };
    
    liguesDispo.forEach(ligue => {
        let classementLigue = [...joueursReels].map(n => ({ name: n, score: calculerScoreJoueur(n, ligue, 'general') })).sort((a,b) => b.score - a.score);
        if (classementLigue.length > 0 && classementLigue[0].name === nomJoueur && classementLigue[0].score > 0) {
            badges.push(`<span class="text-xs bg-amber-500/20 text-amber-300 px-2.5 py-1 rounded-lg font-bold border border-amber-500/30">⚡ ${drapeauMap[ligue]} Leader</span>`);
        }
    });

    return badges.join(' ');
}

                <h4 class="font-bold text-amber-400 text-sm">➕ Ajouter un ami par son pseudo :</h4>
                <div class="flex gap-2.5">
                    <input type="text" id="input-nom-ami" placeholder="Entre le pseudo de ton ami..." class="flex-1 bg-slate-950 border-2 border-slate-700 focus:border-amber-400 rounded-xl px-4 py-3 text-amber-400 font-bold outline-none text-sm">
                    <button onclick="ajouterAmi()" class="bg-gradient-to-r from-amber-400 to-yellow-500 text-black px-5 py-3 rounded-xl font-black text-xs active:scale-95 transition-all">Ajouter</button>
                </div>
            </div>

            <div class="space-y-3.5">
                <div class="flex flex-col sm:flex-row justify-between items-center gap-2 mb-2">
                    <h4 class="font-bold text-amber-400 text-sm">🏆 Classement Amis :</h4>
                    <div class="flex justify-center gap-1.5 overflow-x-auto pb-1 w-full sm:w-auto">
                        ${liguesBoutonsAmis.map(b => `
                            <button onclick="changerAmisLeague('${b.id}')" class="px-2.5 py-1 rounded-lg font-bold text-[10px] transition-all border ${amisLeagueFilter === b.id ? 'bg-amber-400 text-black border-amber-400 shadow font-black' : 'bg-slate-900 text-slate-400 border-slate-800 hover:text-white'}">
                                ${b.label}
                            </button>
                        `).join('')}
                    </div>
                </div>`;

    let mesAmisAffiches = [userProfile.name, ...listeAmis];
    let classementAmisFiltre = mesAmisAffiches.map((nomAmi) => ({ 
        name: nomAmi, 
        score: calculerScoreJoueur(nomAmi, amisLeagueFilter, 'general') 
    }));
    classementAmisFiltre.sort((a, b) => b.score - a.score);

    classementAmisFiltre.forEach((f, idx) => {
        let isMe = f.name === userProfile.name;
        let scoreAmiSecurise = (f.score !== undefined && f.score !== null) ? f.score : 0;
        let badgesPersistants = getBadgesJoueurPersistants(f.name);

        html += `
            <div class="bg-slate-900 border ${isMe ? 'border-amber-400 bg-amber-400/10' : 'border-slate-800'} p-4 rounded-2xl flex items-center justify-between shadow">
                <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-xl bg-slate-950 flex items-center justify-center font-black text-amber-400 text-xs">#${idx + 1}</span>
                    <div class="flex items-center flex-wrap gap-2.5">
                        <span class="font-bold text-white text-sm">${f.name} ${isMe ? '(Toi)' : ''}</span>
                        <div class="flex items-center gap-1.5 flex-wrap">${badgesPersistants}</div>
                    </div>
                </div>
                <div class="flex items-center gap-3.5">
                    <span class="font-black text-amber-400 text-base">${scoreAmiSecurise} pts</span>
                    ${!isMe ? `<button onclick="supprimerAmi('${f.name}')" class="text-xs text-red-400 hover:text-red-300 font-bold px-2.5 py-1 bg-red-500/10 rounded-lg">✕</button>` : ''}
                </div>
            </div>`;
    });

    html += `</div></div>`;
    document.getElementById('content').innerHTML = html;
}

async function ajouterAmi() {
    let input = document.getElementById('input-nom-ami');
    let nomAmi = input.value.trim();
    if (!nomAmi) { alert("Entre un pseudo valide !"); return; }
    
    if (nomAmi.toLowerCase() === userProfile.name.toLowerCase() || listeAmis.map(a => a.toLowerCase()).includes(nomAmi.toLowerCase())) {
        alert("Cet ami est déjà dans ta liste !");
        return;
    }

    let { data } = await supabaseClient.from('pronos').select('user_email');
    let pseudoExiste = false;
    if (data) {
        pseudoExiste = data.some(row => row.user_email && row.user_email.split('@')[0].toLowerCase() === nomAmi.toLowerCase());
    }

    let avatarsConnus = playerAvatars.map(a => a.id);
    
    if (!pseudoExiste && !avatarsConnus.includes(nomAmi.toLowerCase()) && nomAmi.toLowerCase() !== "roiprono") {
        alert("Le pseudo n'existe pas ou l'utilisateur n'est pas inscrit sur PronoKings !");
        return;
    }

    listeAmis.push(nomAmi);
    localStorage.setItem('pronokings_amis', JSON.stringify(listeAmis));
    input.value = '';
    renderAmis();
}

function supprimerAmi(nom) {
    listeAmis = listeAmis.filter(a => a !== nom);
    localStorage.setItem('pronokings_amis', JSON.stringify(listeAmis));
    renderAmis();
}

function switchTab(n) {
    activeTabGlobal = n;
    document.querySelectorAll('button[id^="tab"]').forEach((b, idx) => {
        if (idx === n) { b.classList.add('tab-active'); b.classList.remove('tab-gold-frame'); }
        else { b.classList.remove('tab-active'); b.classList.add('tab-gold-frame'); }
    });
    if (n === 0) renderPronos(); 
    else if (n === 1) renderRegles(); 
    else if (n === 2) renderClassement(); 
    else if (n === 3) renderHallOfFame(); 
    else if (n === 4) renderRecompenses(); 
    else if (n === 5) renderLive(); 
    else if (n === 6) renderAmis();
}

async function chargerPronosDepuisSupabase() {
    let { data } = await supabaseClient.from('pronos').select('*');
    if (data) {
        allPronos = { L1: {}, PL: {}, LI: {}, BL: {}, SA: {} };
        data.forEach(row => {
            if (!allPronos[row.league]) allPronos[row.league] = {};
            if (!allPronos[row.league][1]) allPronos[row.league][1] = {};
            if (!allPronos[row.league][1][row.user_email]) allPronos[row.league][1][row.user_email] = {};
            allPronos[row.league][1][row.user_email][row.match_index] = { h: row.score_home, a: row.score_away, validated: row.validated };
        });
        if (activeTabGlobal === 0) renderPronos();
        if (activeTabGlobal === 2) renderClassement();
    }
}

async function sauvegarderPronoSupabase(league, journee, matchIdx, h, a, validated) {
    if (!currentUser) return;
    await supabaseClient.from('pronos').upsert({
        user_email: currentUser.email,
        league, journee, match_index: matchIdx, score_home: h, score_away: a, validated
    }, { onConflict: 'user_email,league,journee,match_index' });
}

mettreAJourHeaderProfil();
verifierSessionSupabase();
switchTab(0);
</script>
