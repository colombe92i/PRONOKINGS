function mettreAJourHeaderProfil() {
    document.getElementById('header-avatar-container').innerHTML = getPlayerSVG(userProfile.avatarId);
    document.getElementById('header-pseudo').innerText = userProfile.name;
}

async function verifierSessionSupabase() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
        currentUser = session.user;
        document.getElementById('auth-modal').classList.add('hidden');
        if (currentUser.email) {
            let pseudoExtrait = currentUser.email.split('@')[0];
            if (userProfile.name === "RoiProno") userProfile.name = pseudoExtrait;
        }
        mettreAJourHeaderProfil();
        chargerPronosDepuisSupabase();
    } else {
        document.getElementById('auth-modal').classList.remove('hidden');
    }
}

function basculerModeAuth() {
    isSignUpMode = !isSignUpMode;
    document.getElementById('auth-title').innerText = isSignUpMode ? "Créer un compte" : "Connexion à ton compte";
    document.getElementById('auth-submit-btn').innerText = isSignUpMode ? "S'inscrire" : "Se connecter";
    document.getElementById('auth-switch-btn').innerText = isSignUpMode ? "Déjà un compte ? Se connecter" : "Pas encore de compte ? S'inscrire";
}

async function gererAuthSupabase() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value.trim();
    if (!email || !password) { alert("Remplis ton e-mail et ton mot de passe !"); return; }

    if (isSignUpMode) {
        const { data, error } = await supabaseClient.auth.signUp({ email, password });
        if (error) { alert("Erreur d'inscription : " + error.message); }
        else {
            alert("Compte créé avec succès ! Tu es connecté.");
            currentUser = data.user;
            document.getElementById('auth-modal').classList.add('hidden');
            mettreAJourHeaderProfil();
            chargerPronosDepuisSupabase();
        }
    } else {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) { alert("Erreur de connexion : " + error.message); }
        else {
            currentUser = data.user;
            document.getElementById('auth-modal').classList.add('hidden');
            let pseudoExtrait = currentUser.email.split('@')[0];
            if (userProfile.name === "RoiProno") userProfile.name = pseudoExtrait;
            mettreAJourHeaderProfil();

function genererCalendrier(clubList) {
    const calendar = {}; const n = clubList.length; const teams = clubList.map((c, idx) => ({ ...c, id: idx }));
    for (let round = 0; round < n - 1; round++) {
        const jNum = round + 1; calendar[jNum] = [];
        for (let i = 0; i < n / 2; i++) {
            const home = teams[i]; const away = teams[n - 1 - i];
            const isReverse = (round % 2 === 1 && i === 0) || (i > 0 && (i + round) % 2 === 1);
            calendar[jNum].push({
                home: (isReverse ? away : home).home, codeH: (isReverse ? away : home).code, bgH: (isReverse ? away : home).bg, textH: (isReverse ? away : home).text,
                away: (isReverse ? home : away).home, codeA: (isReverse ? home : away).code, bgA: (isReverse ? home : away).bg, textA: (isReverse ? home : away).text,
                stats: { h: 40, n: 25, a: 35 }
            });
        }
        teams.splice(1, 0, teams.pop());
    }
    for (let j = 1; j <= n / 2; j++) {
        calendar[j + (n - 1)] = calendar[j].map(m => ({ home: m.away, codeH: m.codeA, bgH: m.bgA, textH: m.textH, away: m.home, codeA: m.codeH, bgA: m.bgH, textA: m.textH, stats: { h: 35, n: 25, a: 40 } }));
    }
    return calendar;
}

                    <div class="text-[10px] font-black uppercase text-amber-400 mb-2">Ton Pronostic</div>
                    <div class="flex justify-center items-center gap-3">
                        <input type="number" min="0" max="9" value="${p.h !== undefined ? p.h : ''}" id="h${i}" ${p.validated ? 'disabled' : ''} class="w-14 h-14 text-center text-2xl font-black bg-slate-900 border-2 border-slate-700 text-amber-400 rounded-xl focus:outline-none">
                        <span class="text-2xl font-black text-amber-400">-</span>
                        <input type="number" min="0" max="9" value="${p.a !== undefined ? p.a : ''}" id="a${i}" ${p.validated ? 'disabled' : ''} class="w-14 h-14 text-center text-2xl font-black bg-slate-900 border-2 border-slate-700 text-amber-400 rounded-xl focus:outline-none">
                    </div>
                </div>
                <button onclick="window.validerUnicProno(${i})" ${p.validated ? 'disabled' : ''} class="mt-6 w-full py-3.5 rounded-2xl font-extrabold text-sm ${p.validated ? 'bg-amber-500/20 text-amber-300 border border-amber-400/50 cursor-not-allowed opacity-90' : 'bg-gradient-to-r from-amber-400 to-yellow-500 text-black shadow-lg'}">${p.validated ? 'Validé (Définitif)' : 'Valider ce pronostic'}</button>
            </div>`;
    });
    document.getElementById('content').innerHTML = html;
    document.getElementById('progress-container').style.display = 'block';
    updateProgressBar();
}

window.validerUnicProno = async function(i) {
    const hInput = document.getElementById('h' + i); const aInput = document.getElementById('a' + i);
    if (!hInput || !aInput || hInput.value === '' || aInput.value === '') { alert("Remplis les deux scores !"); return; }
    const h = parseInt(hInput.value, 10); const a = parseInt(aInput.value, 10);
    if (!currentUser) return;
    
    if (!allPronos[currentLeague]) allPronos[currentLeague] = {};
    if (!allPronos[currentLeague][currentJournee]) allPronos[currentLeague][currentJournee] = {};
    if (!allPronos[currentLeague][currentJournee][currentUser.email]) allPronos[currentLeague][currentJournee][currentUser.email] = {};
    
    allPronos[currentLeague][currentJournee][currentUser.email][i] = { h, a, validated: true };
    await sauvegarderPronoSupabase(currentLeague, currentJournee, i, h, a, true);
    renderPronos(); lancerAnimationConfetti();
};

function changerClassementSubTab(sub) { classementSubTab = sub; renderClassement(); }

function renderClassement() {
    document.getElementById('selector-box').style.display = 'flex';
    document.getElementById('progress-container').style.display = 'none';
    
    let joueursScores = {};
    Object.keys(allPronos).forEach(ligue => {
        let leaguePronos = allPronos[ligue];
        Object.keys(leaguePronos).forEach(jNum => {
            let joursPronos = leaguePronos[jNum];
            let currentMatches = (ligue === currentLeague) ? (getCurrentJournees()[jNum] || []) : [];

            Object.keys(joursPronos).forEach(userEmail => {
                let pseudo = (currentUser && userEmail === currentUser.email && userProfile.name) ? userProfile.name : userEmail.split('@')[0];
                if (!joueursScores[pseudo]) joueursScores[pseudo] = { scoreJournee: 0, scoreGeneral: 0, scoreTous: 0 };
                
                let pts = 0;
                Object.keys(joursPronos[userEmail]).forEach(mIdx => {
                    let p = joursPronos[userEmail][mIdx];
                    let matchReel = currentMatches[mIdx];
                    let scoreReelH = matchReel ? matchReel.scoreH : undefined; 
                    let scoreReelA = matchReel ? matchReel.scoreA : undefined;
                    let matchJoue = false;

                    if (p && p.validated && matchJoue) {
                        if (p.h === scoreReelH && p.a === scoreReelA) pts += 3;
                        else if ((p.h > p.a && scoreReelH > scoreReelA) || (p.h < p.a && scoreReelH < scoreReelA) || (p.h === p.a && scoreReelH === scoreReelA)) pts += 1;
                    }
                });

                joueursScores[pseudo].scoreTous += pts;
                if (ligue === currentLeague) {
                    joueursScores[pseudo].scoreGeneral += pts;
                    if (parseInt(jNum) === currentJournee) {
                        joueursScores[pseudo].scoreJournee += pts;
                    }
                }
            });
        });
    });

    let classementListe = Object.keys(joueursScores).map(nom => {
        let s = joueursScores[nom];
        let scoreFinal = classementSubTab === 'tous-championnats' ? s.scoreTous : (classementSubTab === 'general' ? s.scoreGeneral : s.scoreJournee);
        return { name: nom, score: scoreFinal };
    });
    classementListe.sort((a, b) => b.score - a.score);

    let html = `
        <div class="glass-card rounded-3xl p-6 sm:p-8 border-2 border-amber-400 shadow-2xl max-w-2xl mx-auto">
            <div class="text-center mb-6"><div class="inline-block bg-amber-400/20 text-amber-400 text-xs font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-amber-400/40 mb-3">Classement Officiel</div><h2 class="text-2xl font-black text-white font-brand">Tableau des Maîtres</h2></div>
            <div class="grid grid-cols-3 gap-2 bg-slate-900 p-1.5 rounded-2xl border border-slate-800 mb-6">
                <button onclick="changerClassementSubTab('journee')" class="py-2.5 rounded-xl font-bold text-xs transition-all ${classementSubTab === 'journee' ? 'subtab-active' : 'text-slate-400'}">Journée</button>
                <button onclick="changerClassementSubTab('general')" class="py-2.5 rounded-xl font-bold text-xs transition-all ${classementSubTab === 'general' ? 'subtab-active' : 'text-slate-400'}">Général</button>
                <button onclick="changerClassementSubTab('tous-championnats')" class="py-2.5 rounded-xl font-bold text-xs transition-all ${classementSubTab === 'tous-championnats' ? 'subtab-active' : 'text-slate-400'}">Tous</button>
            </div>
            <div class="space-y-3">`;

    classementListe.forEach((j, idx) => {
        let rankClass = "bg-slate-900/80 border-slate-800"; let badge = `#${idx + 1}`; 
        if (idx === 0) { rankClass = "border-amber-400/80 bg-amber-400/10"; badge = "👑"; }

        html += `
            <div class="${rankClass} border-2 p-4 rounded-2xl flex items-center justify-between shadow-md">
                <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-xl bg-slate-950 flex items-center justify-center font-black text-amber-400 text-sm">${badge}</span>
                    <span class="font-bold text-white text-base">${j.name}</span>
                </div>
                <span class="font-black text-amber-400 text-lg">${j.score} pts</span>
            </div>`;
    });
    html += `</div></div>`;
    document.getElementById('content').innerHTML = html;
}

function renderRecompenses() {
    document.getElementById('selector-box').style.display = 'none';
    document.getElementById('progress-container').style.display = 'none';
    document.getElementById('content').innerHTML = `<div class="glass-card rounded-3xl p-8 border-2 border-amber-400 text-center max-w-2xl mx-auto"><h2 class="text-2xl font-black text-amber-400 mb-4">Trophées & Gains</h2><p class="text-xs text-slate-300">Bons d'achat Amazon à gagner en fin de saison !</p></div>`;
}

async function renderLive() {
    document.getElementById('selector-box').style.display = 'flex';
    document.getElementById('progress-container').style.display = 'none';
    document.getElementById('content').innerHTML = `<div class="glass-card rounded-3xl p-8 text-center text-amber-400">Chargement des matchs en direct...</div>`;
    const matchsApi = await chargerCalendrierJourneeAPI(); const matchesApplication = getCurrentJournees()[currentJournee] || [];
    let html = `<div class="glass-card rounded-3xl p-6 border border-amber-400/40 shadow-xl mb-6 text-center"><h2 class="text-xl font-black uppercase text-amber-400 mb-4">Live & Scores</h2><div class="space-y-4 max-w-xl mx-auto text-left">`;
    matchesApplication.forEach((m, idx) => {
        let scoreH = matchsApi[idx]?.homeScore?.current ?? "0"; let scoreA = matchsApi[idx]?.awayScore?.current ?? "0";
        html += `<div class="bg-slate-900 border border-amber-400/40 rounded-2xl p-4 flex justify-between items-center text-center"><span class="font-bold flex-1 text-right">${m.home}</span><span class="bg-slate-950 px-4 py-2 rounded-xl font-black text-amber-400 mx-4">${scoreH} - ${scoreA}</span><span class="font-bold flex-1 text-left">${m.away}</span></div>`;
    });
    html += `</div></div>`; document.getElementById('content').innerHTML = html;
}

function renderAmis() {
    document.getElementById('selector-box').style.display = 'none';
    document.getElementById('progress-container').style.display = 'none';

    let monCodeAmi = currentUser ? btoa(currentUser.email).substring(0, 8).toUpperCase() : "INVITE";

    let html = `
        <div class="glass-card rounded-3xl p-6 sm:p-8 border-2 border-amber-400 shadow-2xl max-w-2xl mx-auto space-y-6">
            <div class="text-center">
                <div class="inline-block bg-amber-400/20 text-amber-400 text-xs font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-amber-400/40 mb-3">Espace Amis & Ligues Privées</div>
                <h2 class="text-2xl font-black text-white font-brand">Affronte tes proches !</h2>
            </div>

            <div class="bg-slate-900/90 p-5 rounded-2xl border border-slate-800 text-center space-y-2">
                <p class="text-xs text-slate-400 font-bold uppercase">Ton Code Ami Unique :</p>
                <div class="text-2xl font-black text-amber-400 tracking-wider bg-slate-950 py-2 px-4 rounded-xl inline-block border border-amber-400/30">${monCodeAmi}</div>
                <p class="text-[11px] text-slate-400">Partage ce code ou le lien de l'application à tes amis pour qu'ils t'ajoutent.</p>
            </div>

            <div class="bg-slate-900/90 p-5 rounded-2xl border border-slate-800 space-y-3">
                <h4 class="font-bold text-amber-400 text-sm">➕ Ajouter un ami par son pseudo :</h4>
                <div class="flex gap-2">
                    <input type="text" id="input-nom-ami" placeholder="Entre le pseudo de ton ami..." class="flex-1 bg-slate-950 border-2 border-slate-700 focus:border-amber-400 rounded-xl px-4 py-2.5 text-amber-400 font-bold outline-none text-sm">
                    <button onclick="ajouterAmi()" class="bg-gradient-to-r from-amber-400 to-yellow-500 text-black px-5 py-2.5 rounded-xl font-black text-xs active:scale-95 transition-all">Ajouter</button>
                </div>
            </div>

            <div class="space-y-3">
                <h4 class="font-bold text-amber-400 text-sm">🏆 Classement de ton Groupe d'Amis :</h4>`;

    let joueursScoresAmis = {};
    Object.keys(allPronos).forEach(ligue => {
        let leaguePronos = allPronos[ligue];
        Object.keys(leaguePronos).forEach(jNum => {
            let joursPronos = leaguePronos[jNum];
            Object.keys(joursPronos).forEach(userEmail => {
                let pseudo = (currentUser && userEmail === currentUser.email && userProfile.name) ? userProfile.name : userEmail.split('@')[0];
                if (!joueursScoresAmis[pseudo]) joueursScoresAmis[pseudo] = { total: 0 };
                Object.keys(joursPronos[userEmail]).forEach(mIdx => {
                    let p = joursPronos[userEmail][mIdx];
                    let matchJoue = false;
                    if (p && p.validated && matchJoue) joueursScoresAmis[pseudo].total += 3;
                });
            });
        });
    });

    let mesAmisAffiches = [userProfile.name, ...listeAmis];
    let classementAmisFiltre = [];

    mesAmisAffiches.forEach(nomAmi => {
        let score = joueursScoresAmis[nomAmi] ? joueursScoresAmis[nomAmi].total : 0;
        classementAmisFiltre.push({ name: nomAmi, score: score });
    });

    classementAmisFiltre.sort((a, b) => b.score - a.score);

    classementAmisFiltre.forEach((f, idx) => {
        let isMe = f.name === userProfile.name;
        html += `
            <div class="bg-slate-900 border ${isMe ? 'border-amber-400 bg-amber-400/10' : 'border-slate-800'} p-3.5 rounded-2xl flex items-center justify-between shadow">
                <div class="flex items-center gap-3">
                    <span class="w-7 h-7 rounded-lg bg-slate-950 flex items-center justify-center font-black text-amber-400 text-xs">#${idx + 1}</span>
                    <span class="font-bold text-white text-sm">${f.name} ${isMe ? '(Toi)' : ''}</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="font-black text-amber-400 text-base">${f.score} pts</span>
                    ${!isMe ? `<button onclick="supprimerAmi('${f.name}')" class="text-xs text-red-400 hover:text-red-300 font-bold px-2 py-1 bg-red-500/10 rounded-lg">✕</button>` : ''}
                </div>
            </div>`;
    });

    html += `</div></div>`;
    document.getElementById('content').innerHTML = html;
}

function ajouterAmi() {
    let input = document.getElementById('input-nom-ami');
    let nomAmi = input.value.trim();
    if (!nomAmi) { alert("Entre un pseudo valide !"); return; }
    if (listeAmis.includes(nomAmi) || nomAmi.toLowerCase() === userProfile.name.toLowerCase()) {
        alert("Cet ami est déjà dans ta liste !");
        return;
    }
    listeAmis.push(nomAmi);
    localStorage.setItem('pronokings_amis', JSON.stringify(listeAmis));
    input.value = '';
    renderAmis();
}

function supprimerAmi(nom) {
    listeAmis = listeAmis.filter(a => a !== nom);
    localStorage.setItem('pronokings_amis', JSON.stringify(listeAmis));
    renderAmis();
}

function switchTab(n) {
    activeTabGlobal = n;
    document.querySelectorAll('button[id^="tab"]').forEach((b, idx) => {
        if (idx === n) { b.classList.add('tab-active'); b.classList.remove('text-slate-300'); }
        else { b.classList.remove('tab-active'); b.classList.add('text-slate-300'); }
    });
    if (n === 0) renderPronos(); else if (n === 1) renderRegles(); else if (n === 2) renderClassement(); else if (n === 3) renderRecompenses(); else if (n === 4) renderLive(); else if (n === 5) renderAmis();
}

mettreAJourHeaderProfil();
initDropdownJournees();
updateJourneeHeader();
mettreAJourDateFermetureAPI();
verifierSessionSupabase();
switchTab(0);
</script>
